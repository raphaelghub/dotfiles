"$schema" = 'https://starship.rs/config-schema.json'

# Configuration
add_newline = true
command_timeout = 4000

# Prompt format - order matters for performance
format = """
$directory(full_path=true)\
$fill\
$username\
$git_branch\
$git_state $git_status\
$shell\
$cmd_duration $jobs $time\
$hostname\
$line_break\
$character\
"""

[fill]
symbol = " "

[directory]
style = "cyan"
truncation_length = 5
truncate_to_repo = false
repo_root_style = "bold cyan"
home_symbol = "~"
truncation_symbol = '**/'

[directory.substitutions]
'~/world/trees/root' = '.world-root.'

[git_branch]
format = 'on [$symbol$branch(:$remote_branch)]($style) '
style = "bold bright-black"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'  # Template for displaying git status info in brackets
style = "bold cyan"  # Color and style for the git status display
conflicted = "!"  # Symbol shown when there are merge conflicts
ahead = "↑${count}"  # Symbol and count when local branch is ahead of remote
behind = "↓${count}"  # Symbol and count when local branch is behind remote
untracked = "?${count}"  # Symbol and count for untracked/new files
stashed = "≡${count}"  # Symbol and count for stashed changes (fixed the $ escape issue)
modified = "~${count}"  # Symbol and count for modified files
renamed = "→${count}"  # Symbol and count for renamed files
staged = "+${count}"  # Symbol and count for staged changes (ready to commit)
deleted = "x${count}"  # Symbol and count for deleted files

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[PICK](red)'  # Consistent text-based symbols
rebase = '[REBASE](red)'  # Consistent text-based symbols

[time]
disabled = false
style = "bright-black"
format = "[$time]($style)"

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"

[custom.stunnel]
when = "ps aux | grep stunnel | grep -v grep"
command = "ps -o etime= -p $(ps aux | grep stunnel | grep -v grep | awk '{print $2}')"
style = "red"
format = "[TUNNEL OPEN for $output]($style)"

[battery]
full_symbol = '🔋'
charging_symbol = '⚡'
discharging_symbol = '💀'

[character]
success_symbol = '[>](bold green) '
error_symbol = '[>](bold red) '

[jobs]
symbol = "✦"
style = "bold red"
number_threshold = 1
format = "[$symbol]($style)"

[username]
style_user = 'bright-black'
style_root = 'black'
format = '[$user]($style) '
disabled = false
show_always = true
aliases = { "raphaellomotey" = "work" }
